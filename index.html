    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

    .metric-card .value{font-size:20px;font-weight:700;color:var(--brand-dark);line-height:1.2;}
    .metric-card .sub{font-size:11px;color:#b07040;margin-top:3px;}
    .metric-card .delta-up{color:#16a34a;font-size:11px;margin-top:2px;}
    .metric-card .delta-down{color:#dc2626;font-size:11px;margin-top:2px;}
    .section{margin-bottom:20px;}

    .badge-sf{background:#dbeafe;color:#1d4ed8;}
    .badge-hs{background:var(--ember-light);color:var(--ember-dark);}
    .badge-global{background:#fdd0b1;color:#9a5c3b;}
    .data-table{width:100%;border-collapse:collapse;font-size:12px;}
    .data-table th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:#9a5c3b;border-bottom:1px solid #fdd0b1;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid #fff0e6;}
    .data-table tr:last-child td{border-bottom:none;}
    .data-table tr:hover td{background:#fff7f0;}
    .data-table td.amt{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;}
    .data-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
    .deal-link{color:inherit;text-decoration:none;}
    .deal-link:hover{text-decoration:underline;color:var(--ember);}

    .mrow:last-child{border-bottom:none;}
    .mrow-label{color:#374151;display:flex;align-items:center;gap:5px;}
    .mrow-value{font-weight:600;color:var(--brand-dark);font-variant-numeric:tabular-nums;}
    .chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
    .chip-high{background:#dbeafe;color:#1e40af;}
    .chip-medium{background:#fef9c3;color:#854d0e;}
    .chip-smb{background:#fdd0b1;color:#9a3412;}
    .empty-row{padding:20px 10px;color:#b07040;font-style:italic;}
    .up{color:#16a34a;}
    .down{color:#dc2626;}
    tr.current-week td{background:#fff0e6!important;font-weight:600;}
    .table-scroll{overflow-x:auto;}
    hr{border:none;border-top:1px solid #fdd0b1;margin:16px 0;}
    .chart-card{background:#fff;border:1px solid #fdd0b1;border-radius:8px;padding:14px 16px;}
    .chart-wrap{position:relative;height:180px;}
    .chart-wrap-lg{position:relative;height:220px;}
    .region-nav{display:flex;align-items:center;gap:5px;}
    .region-btn{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.6);background:#fda46a;color:#fff;cursor:pointer;font-size:11px;font-weight:600;transition:all 0.15s;}

    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}

// ── REGION ────────────────────────────────────────────────────────────────
function marketRegion(m){
  m=m||'';

  if(m==='South East Asia')return'SEA';
  if(m==='United States')return'US';
  return'OTHER';
}
function countryRegion(c){
  c=(c||'').toUpperCase();
  if(['AU','NZ'].includes(c))return'ANZ';
  if(['SG','MY'].includes(c))return'SEA';
  if(c==='US')return'US';
  return'OTHER';
}

const fmtAUD=n=>(n==null||isNaN(n))?'--':'$'+Math.round(n).toLocaleString('en-AU');
const fmtAUDK=n=>{if(n==null||isNaN(n))return'--';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1000)return'$'+Math.round(n/1000)+'K';return'$'+Math.round(n);};
const fmtNum=n=>(n==null||isNaN(n))?'--':Math.round(n).toLocaleString('en-AU');

function deltaHTML(cur,prev){if(!prev||prev===0)return'';const d=cur-prev,p=Math.abs((d/Math.abs(prev))*100).toFixed(0),g=d>0;return`<div class="${g?'delta-up':'delta-down'}">${d>0?'&#8593;':'&#8595;'} ${p}% vs prev week</div>`;}

function filterByRegion(rows,mIdx){
  if(selectedRegion==='ALL')return rows;

function filterChurnsByRegion(rows){

function monthlyActuals(raw){
  const out={};
  raw.forEach(r=>{
    const m=r[0],market=r[1],val=+r[2]||0;
    if(selectedRegion==='ALL'||marketRegion(market)===selectedRegion){
      out[m]=(out[m]||0)+val;
    }
  });
  return out;
}
function groupBy(arr,kFn,vFn){
  const t={};
  arr.forEach(r=>{const k=kFn(r)||'Other';t[k]=(t[k]||0)+vFn(r);});
  return Object.entries(t).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0);
}

// ── METRIC CARD HELPERS ────────────────────────────────────────────────────
function mc(label,value,bc,bt,delta,sub){return`<div class="metric-card"><div class="label">${label} <span class="badge ${bc}">${bt}</span></div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}${delta||''}</div>`;}
function mcPacing(label,bc,bt,pct,avgPct,wkLabel){
  if(pct==null)return`<div class="metric-card"><div class="label">${label} <span class="badge ${bc}">${bt}</span></div><div class="value">--</div></div>`;
  const delta=+(pct-avgPct).toFixed(1);
  const up=delta>=0;
  const scale=100;
  const barW=Math.min((pct/scale)*100,96).toFixed(1);
  const avgW=Math.min((avgPct/scale)*100,96).toFixed(1);
  return`<div class="metric-card">
    <div class="label">${label} <span class="badge ${bc}">${bt}</span></div>
    <div class="value">${pct.toFixed(1)}%</div>
    <div style="margin-top:3px;font-size:11px;color:${up?'#16a34a':'#dc2626'};font-weight:600">${up?'▲':'▼'} ${Math.abs(delta).toFixed(1)}% vs ${avgPct.toFixed(1)}% avg</div>
    <div style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:4px">
        <span>${wkLabel}</span><span>avg: ${avgPct.toFixed(1)}%</span>
      </div>
      <div style="background:#f3f4f6;border-radius:3px;height:5px;position:relative">
        <div style="background:var(--ember);height:5px;border-radius:3px 0 0 3px;width:${barW}%"></div>
        <div style="position:absolute;top:-3px;left:${avgW}%;width:2px;height:11px;background:#9ca3af;border-radius:1px"></div>
      </div>
    </div>
  </div>`;
}
function mcProgress(label,value,bc,bt,pct,target){
  const bw=pct!=null?Math.min(pct,100):0,bc2=pct!=null&&pct>=100?'#16a34a':'var(--ember)',pc=pct!=null&&pct>=100?'#16a34a':'var(--brand-dark)';
  return`<div class="metric-card"><div class="label">${label} <span class="badge ${bc}">${bt}</span></div><div class="value">${value}</div>${pct!=null?`<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:3px"><span style="font-weight:700;color:${pc}">${pct}% to target</span><span>of ${fmtAUD(target)}</span></div><div style="background:#f3f4f6;border-radius:3px;height:5px"><div style="background:${bc2};height:5px;border-radius:3px;width:${bw}%"></div></div></div>`:''}</div>`;
}
function regionTrials(kpi){switch(selectedRegion){case'ANZ':return kpi.auTrials+kpi.nzTrials;case'SEA':return kpi.seaTrials;case'US':return kpi.usTrials;default:return kpi.trials;}}
function annualDealStats(closed){
  if(!closed.length)return{pct:null,annual:0,total:0};
  const a=closed.filter(r=>(r[4]||'').toLowerCase()==='annual').length;
  return{pct:(a/closed.length)*100,annual:a,total:closed.length};
}
function icpChip(icp){if(!icp)return'<span class="chip chip-smb">SMB</span>';const l=icp.toLowerCase();if(['high','core','very high'].includes(l))return`<span class="chip chip-high">${icp}</span>`;if(l==='medium')return`<span class="chip chip-medium">${icp}</span>`;return`<span class="chip chip-smb">${icp}</span>`;}

    <div class="two-col" style="margin-bottom:16px">
      <div class="card">
        <div class="section-header">Trials Created This Week <span class="badge badge-sf">Snowflake</span></div>
        <div class="mrow"><span class="mrow-label" style="font-weight:700">Total</span><span class="mrow-value" style="font-size:18px">${kpi?fmtNum(regionTrials(kpi)):'--'}</span></div>
        <div class="mrow"><span class="mrow-label">AU</span><span class="mrow-value">${kpi?kpi.auTrials:'--'}</span></div>
        <div class="mrow"><span class="mrow-label">NZ</span><span class="mrow-value">${kpi?kpi.nzTrials:'--'}</span></div>
        <div class="mrow"><span class="mrow-label">SEA</span><span class="mrow-value">${kpi?kpi.seaTrials:'--'}</span></div>
        <div class="mrow"><span class="mrow-label">US</span><span class="mrow-value">${kpi?kpi.usTrials:'--'}</span></div>
        <hr>
        <div class="mrow"><span class="mrow-label" style="font-weight:700">Active Trials Now <span class="badge badge-sf">Snowflake</span></span><span class="mrow-value" style="font-size:18px">${tc.total}</span></div>
        <div class="mrow"><span class="mrow-label">AU</span><span class="mrow-value">${tc.au}</span></div>
        <div class="mrow"><span class="mrow-label">NZ</span><span class="mrow-value">${tc.nz}</span></div>
        <div class="mrow"><span class="mrow-label">SEA</span><span class="mrow-value">${tc.sea}</span></div>
        <div class="mrow"><span class="mrow-label">US</span><span class="mrow-value">${tc.us}</span></div>
      </div>
      <div class="card">
        <div class="section-header">Pipeline Created This Week <span class="badge badge-sf">Snowflake</span><span class="section-header-right">${pipe.length} opps ~ ${fmtAUD(pipe.reduce((s,r)=>s+r[2],0))}</span></div>
        ${pipe.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Deal</th><th style="text-align:right">Amount</th></tr></thead><tbody>${pipe.slice(0,15).map(r=>`<tr><td><a class="deal-link" href="https://app.hubspot.com/contacts/24160926/record/0-3/${r[0]}" target="_blank">${r[1]}</a></td><td class="amt">${fmtAUD(r[2])}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty-row">No pipeline created</div>'}
      </div>
    </div>`;
}

// ── CS ─────────────────────────────────────────────────────────────────────
function renderCS(){
  const churns=filterChurnsByRegion(RAW_CHURNS);
  const weeklyChurnArr=churns.reduce((s,r)=>s+r[2],0);
  const renewals=filterByRegion(RAW_RENEWALS,4);
  const exps=filterByRegion(RAW_EXPANSIONS,5);
  const expCV=exps.reduce((s,r)=>s+r[4],0);
  const now=new Date();
  const mChurnArr=(selectedRegion==='ALL'||selectedRegion==='ANZ')?7587.82:0;
  const mChurnCount=(selectedRegion==='ALL'||selectedRegion==='ANZ')?5:0;
  document.getElementById('cs-content').innerHTML=`
    <div class="section-header" style="margin-bottom:8px">This Week</div>
    <div class="metric-grid-2" style="margin-bottom:12px">
      ${mc('Weekly Churns #',fmtNum(churns.length),'badge-sf','Snowflake','','annual subs only')}
      ${mc('Weekly Churn ARR (ex-GST)','<span class="down">'+fmtAUD(weeklyChurnArr)+'</span>','badge-sf','Snowflake','','annual subs only')}
    </div>
    <div class="section-header" style="margin-bottom:8px">June 2026 Month-to-Date</div>
    <div class="metric-grid-2" style="margin-bottom:16px">
      ${mc('Monthly Churns #',fmtNum(mChurnCount),'badge-sf','Snowflake','','annual subs only')}
      ${mc('Monthly Churn ARR (ex-GST)','<span class="down">'+fmtAUD(mChurnArr)+'</span>','badge-sf','Snowflake','','annual subs only')}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-header">Churned Customers This Week <span class="badge badge-sf">Snowflake</span><span class="section-header-right">Annual ~ ${churns.length} churns ~ ${fmtAUD(weeklyChurnArr)}</span></div>
      ${churns.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Customer</th><th style="text-align:right">ARR Lost</th><th>ICP</th><th>Date</th></tr></thead><tbody>${churns.map(r=>`<tr><td>${r[0]||'--'}</td><td class="amt down">${r[2]>0?fmtAUD(r[2]):'$0'}</td><td>${icpChip(r[3])}</td><td style="color:#6b7280">${r[4]||'--'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty-row">No annual churns found</div>'}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-header">Priority Renewals <span class="badge badge-sf">Snowflake</span><span class="section-header-right">Closing ~ 4 weeks ~ ${renewals.length} deals ~ ${fmtAUD(renewals.reduce((s,r)=>s+r[2],0))}</span></div>
      ${renewals.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Deal</th><th style="text-align:right">Value</th><th>Close Date</th></tr></thead><tbody>${renewals.map(r=>{const du=r[3]?Math.round((new Date(r[3])-now)/86400000):null;const urg=du!==null&&du<=7?'style="color:#dc2626;font-weight:700"':du!==null&&du<=14?'style="color:#d97706;font-weight:600"':'';return`<tr><td><a class="deal-link" href="https://app.hubspot.com/contacts/24160926/record/0-3/${r[0]}" target="_blank">${r[1]}</a></td><td class="amt">${fmtAUD(r[2])}</td><td ${urg}>${r[3]?new Date(r[3]).toLocaleDateString('en-AU'):'--'}</td></tr>`;}).join('')}</tbody></table></div>`:'<div class="empty-row">No renewals closing soon</div>'}
    </div>
    <div class="card">
      <div class="section-header">Expansions This Week <span class="badge badge-sf">Snowflake</span><span class="section-header-right">Annual ~ ${exps.length} deals ~ CV ${fmtAUD(expCV)}</span></div>
      ${exps.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Deal</th><th style="text-align:right">Amount</th><th style="text-align:right">CV</th><th>Close Date</th></tr></thead><tbody>${exps.map(r=>`<tr><td><a class="deal-link" href="https://app.hubspot.com/contacts/24160926/record/0-3/${r[0]}" target="_blank">${r[1]}</a></td><td class="amt">${fmtAUD(r[2])}</td><td class="amt">${fmtAUD(r[4])}</td><td>${r[3]?new Date(r[3]).toLocaleDateString('en-AU'):'--'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty-row">No expansions</div>'}
    </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
const kpis=KPI_WEEKS.map(r=>({wk:r[0],trials:r[1],auTrials:r[2],nzTrials:r[3],seaTrials:r[4],usTrials:r[5],newCustomers:r[6],totalArr:r[7],arrDelta:r[8],cv:r[9],churnArr:r[10],churnAnnual:r[11]}));
renderOverview(kpis[0],kpis[1],kpis);
renderMetrics(kpis[0],kpis[1],kpis);
renderPriorityDeals();
renderDealDetail();
renderCS();
renderInbound(kpis[0]);
</script>
