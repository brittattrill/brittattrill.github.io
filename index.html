// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const EMBER    = '#F15B06';
const TWILIGHT = '#A48AFB';
const SHALE    = '#E9EAEB';
const HS_BASE  = 'https://app-ap1.hubspot.com/contacts/24160926/record/0-3/';
let _charts    = {};

// ═══════════════════════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════════════════════
function fmtAUD(n) { if(n==null||isNaN(n)) return '—'; return '$'+Math.round(n).toLocaleString('en-AU'); }
function fmtNum(n) { if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('en-AU'); }
function deltaHTML(curr,prev,better=true) {
  if(!prev||prev===0||curr==null) return '';
  const diff=curr-prev, pct=Math.abs((diff/Math.abs(prev))*100).toFixed(0);
  const good=better?diff>0:diff<0, cls=good?'delta-up':'delta-down', arr=diff>0?'↑':'↓';
  return `<div class="${cls}">${arr} ${pct}% vs prev week</div>`;
}
function shortDate(s) {
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}
function monthLbl(s) {
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-AU',{month:'short',year:'2-digit'});
}

// ═══════════════════════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════════════════════
function destroyChart(id) { if(_charts[id]){_charts[id].destroy();delete _charts[id];} }

function makeBarChart(id,labels,data,currentIdx,yFmt,color) {
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx) return;
  _charts[id]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,
      backgroundColor:labels.map((_,i)=>i===currentIdx?(color||EMBER):SHALE),
      borderColor:labels.map((_,i)=>i===currentIdx?'#c94b04':'#d1d5db'),
      borderWidth:1,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+yFmt(c.parsed.y)}}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>yFmt(v)},grid:{color:'#f3f4f6'}},
              x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

function makeComboChart(id,labels,actuals,targets,currentIdx,yFmt,barColor) {
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx) return;
  _charts[id]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {type:'bar',label:'Actual',data:actuals,
       backgroundColor:labels.map((_,i)=>i===currentIdx?(barColor||EMBER):SHALE),
       borderColor:labels.map((_,i)=>i===currentIdx?'#c94b04':'#d1d5db'),
       borderWidth:1,borderRadius:3,order:2},
      {type:'line',label:'Target',data:targets,
       borderColor:'#9ca3af',backgroundColor:'transparent',borderWidth:2,
       borderDash:[5,4],pointRadius:3,pointBackgroundColor:'#9ca3af',tension:0,order:1,spanGaps:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10,padding:8}},
               tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+yFmt(c.parsed.y)}}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>yFmt(v)},grid:{color:'#f3f4f6'}},
              x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

function renderCharts() {
  // Weekly CV (last 13 weeks up to and including featured)
  const cvAll  = KPI.weeks.filter(w=>w.wk<=FEATURED_WK);
  const cvShow = cvAll.slice(-13);
  const cvIdx  = cvShow.length-1;
  makeBarChart('chart-cv', cvShow.map(w=>shortDate(w.wk)), cvShow.map(w=>w.cv), cvIdx, fmtAUD);

  // Weekly Pipeline (last 13 weeks up to and including featured)
  const pipAll  = WEEKLY_PIPELINE.filter(w=>w.wk<=FEATURED_WK);
  const pipShow = pipAll.slice(-13);
  const pipIdx  = pipShow.length-1;
  makeBarChart('chart-pipeline', pipShow.map(w=>shortDate(w.wk)), pipShow.map(w=>w.pipeline), pipIdx, fmtAUD, TWILIGHT);

  // Monthly charts: 13 months ending at current month (Jun 2026)
  const months=[];
  const anchor=new Date('2026-06-01');
  for(let i=12;i>=0;i--){
    const d=new Date(anchor.getFullYear(),anchor.getMonth()-i,1);
    months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01');
  }
  const curMonIdx=months.length-1;
  const mLabels=months.map(monthLbl);
  makeComboChart('chart-cv-monthly',  mLabels, months.map(m=>MONTHLY_CV[m]??0),       months.map(m=>MONTHLY_TARGETS.cv[m]??null),       curMonIdx, fmtAUD);
  makeComboChart('chart-pip-monthly', mLabels, months.map(m=>MONTHLY_PIPELINE[m]??0), months.map(m=>MONTHLY_TARGETS.pipeline[m]??null), curMonIdx, fmtAUD, TWILIGHT);
}

        <div class="section-header" style="margin-bottom:10px">Commissionable Value vs Target <span class="badge badge-sf">Snowflake</span> <span class="section-header-right">CY2026 monthly</span></div>
        <div class="chart-wrap-tall"><canvas id="chart-cv-monthly"></canvas></div>

function mcProgress(label,value,pct,target) {
  const barW=pct!=null?Math.min(pct,100):0;
  const barCol=pct!=null&&pct>=100?'#16a34a':'var(--ember)';
  const pctCol=pct!=null&&pct>=100?'#16a34a':'var(--dark)';
  return `<div class="metric-card">
    <div class="label">${label} <span class="badge badge-sf">Snowflake</span></div>
    <div class="value">${value}</div>
    ${pct!=null?`<div style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:3px">
        <span style="font-weight:700;color:${pctCol}">${pct}% to target</span>
        <span>of ${fmtAUD(target)}</span>
      </div>
      <div style="background:#f3f4f6;border-radius:3px;height:5px">
        <div style="background:${barCol};height:5px;border-radius:3px;width:${barW}%"></div>
      </div></div>`:
    '<div class="sub" style="color:#d1d5db;font-style:italic">no target set</div>'}
  </div>`;
}

function mc(label,value,deltaHtml,sub) {
  return `<div class="metric-card">
    <div class="label">${label} <span class="badge badge-sf">Snowflake</span></div>
    <div class="value">${value}</div>
    ${sub?`<div class="sub">${sub}</div>`:''}
    ${deltaHtml||''}
  </div>`;
}

function switchTab(id) {
  const ids=['overview','metrics','priority'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}
